name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'frontend/pwa/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/pwa/package-lock.json
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install Android SDK
      run: |
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        mkdir -p $HOME/android-sdk/cmdline-tools
        unzip -q cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
        mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
      
    - name: Install dependencies
      working-directory: frontend/pwa
      run: npm ci
      
    - name: Build web assets
      working-directory: frontend/pwa
      run: |
        mkdir -p www
        cp index.html www/
        cp -r *.js *.css images manifest.json sw.js www/ 2>/dev/null || true
        
    - name: Sync Capacitor
      working-directory: frontend/pwa
      run: npx cap sync android
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
      
    - name: Build Debug APK
      working-directory: frontend/pwa/android
      run: ./gradlew assembleDebug
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: soho-menu-debug-apk
        path: frontend/pwa/android/app/build/outputs/apk/debug/app-debug.apk
        
    - name: Build Release APK
      working-directory: frontend/pwa/android
      run: ./gradlew assembleRelease
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
      
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: soho-menu-release-apk
        path: frontend/pwa/android/app/build/outputs/apk/release/app-release-unsigned.apk
