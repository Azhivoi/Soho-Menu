worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

    # Upstream
    upstream backend {
        server backend:8000;
    }

    # HTTP -> HTTPS redirect for soho.by
    server {
        listen 80;
        server_name soho.by www.soho.by;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        return 301 https://soho.by$request_uri;
    }
    
    # HTTP -> HTTPS redirect for IP/nip.io
    server {
        listen 80;
        server_name _;
        return 301 https://45.129.186.118.nip.io$request_uri;
    }

    # Main server - serve content and redirect IP to HTTPS
    server {
        listen 80;
        server_name _;  # Accept any server name for now
        
        root /var/www/soho.by/frontend;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Static uploads (product images)
        # ^~ modifier prevents regex locations from matching
        location ^~ /uploads/ {
            root /opt/soho;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Frontend - PWA
        # Prostie Zvonki webhook API
        location /pbxapi/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket for Prostie Zvonki
        location /ws/pz/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # Favicon and icons from uploads
        location = /favicon.ico {
            alias /opt/soho/uploads/favicon.ico;
            try_files $uri =404;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location / {
            try_files $uri $uri/ /index.html;
            add_header Service-Worker-Allowed "/";
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires -1;
        }
        
        # HTML files - no cache
        location ~* \.html$ {
            try_files $uri =404;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires -1;
        }

        # PWA manifest and service worker
        location ~ ^/(manifest\.json|sw\.js)$ {
            try_files $uri =404;
            add_header Cache-Control "no-cache";
        }

        # API
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }

        # WebSocket for Prostie Zvonki
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # CRM panel - serve files from /opt/soho/frontend/
        # Map /crm/* to /opt/soho/frontend/*
        location /crm/ {
            alias /opt/soho/frontend/;
        }
        
        # Direct access to CRM files without /crm/ prefix
        location ~ ^/crm-.*\.html$ {
            alias /opt/soho/frontend/$uri;
        }

        # Static files cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # Tools folder for downloads
        location /tools/ {
            alias /opt/soho/tools/;
            autoindex on;
            add_header Access-Control-Allow-Origin "*";
        }

        # Certbot challenge (for SSL)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    # HTTPS server for nip.io
    server {
        listen 443 ssl http2;
        server_name 45.129.186.118.nip.io;

        ssl_certificate /etc/letsencrypt/live/45.129.186.118.nip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/45.129.186.118.nip.io/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root /var/www/soho.by/frontend;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Static uploads
        location ^~ /uploads/ {
            root /opt/soho;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Favicon
        location = /favicon.ico {
            alias /opt/soho/uploads/favicon.ico;
            try_files $uri =404;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Frontend
        location / {
            try_files $uri $uri/ /index.html;
            add_header Service-Worker-Allowed "/";
        }

        # API
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # HTTPS server for soho.by
    server {
        listen 443 ssl http2;
        server_name soho.by www.soho.by;

        ssl_certificate /etc/letsencrypt/live/soho.by/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/soho.by/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root /var/www/soho.by/frontend;
        index index.html;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Static uploads
        location ^~ /uploads/ {
            root /opt/soho;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Favicon
        location = /favicon.ico {
            alias /opt/soho/uploads/favicon.ico;
            try_files $uri =404;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Frontend
        location / {
            try_files $uri $uri/ /index.html;
            add_header Service-Worker-Allowed "/";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # API
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        # CRM panel
        location /crm/ {
            alias /opt/soho/frontend/;
        }
        
        # Tools folder
        location /tools/ {
            alias /opt/soho/tools/;
            autoindex on;
            add_header Access-Control-Allow-Origin "*";
        }
        
        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    # HTTP -> HTTPS redirect for nip.io
    server {
        listen 80;
        server_name 45.129.186.118.nip.io;
        return 301 https://$server_name$request_uri;
    }
}
