<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="/js/auth.js"></script>
    <script>document.addEventListener("DOMContentLoaded", function() { const user = getCurrentUser(); if (!user) { window.location.href = "/login.html?redirect=" + encodeURIComponent(window.location.pathname); return; } });</script>
    <meta charset="UTF-8">
    <title>Ингредиенты | SOHO Admin</title>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #252538;
            --accent-red: #e94560;
            --accent-green: #00d9a5;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b8;
            --border-color: #33334d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .back-link { color: var(--text-secondary); text-decoration: none; }
        h1 { margin: 20px 0; }
        h1 span { color: var(--accent-red); }
        
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-secondary); font-size: 14px; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px;
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: 6px; color: white;
        }
        .btn {
            padding: 10px 20px; border-radius: 6px; border: none;
            cursor: pointer; font-size: 14px;
        }
        .btn-primary { background: var(--accent-red); color: white; }
        .btn-secondary { background: var(--bg-secondary); color: white; border: 1px solid var(--border-color); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-secondary); font-weight: normal; }
        .empty { text-align: center; padding: 40px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <a href="admin-panel.html" class="back-link">← Назад</a>
        <h1><span>SOHO</span> Ингредиенты</h1>
        
        <div class="card">
            <h3>➕ Добавить ингредиент</h3>
            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 15px; align-items: end;">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="ingName" placeholder="Например: Мука пшеничная">
                </div>
                <div class="form-group">
                    <label>Категория</label>
                    <input type="text" id="ingCategory" placeholder="Например: Мука">
                </div>
                <div class="form-group">
                    <label>Единица</label>
                    <select id="ingUnit">
                        <option value="кг">кг</option>
                        <option value="г">г</option>
                        <option value="л">л</option>
                        <option value="мл">мл</option>
                        <option value="шт">шт</option>
                        <option value="упак">упак</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="addIngredient()">Добавить</button>
            </div>
        </div>
        
        <div class="card">
            <h3>📋 Список ингредиентов</h3>
            <div id="ingredientsList">
                <div class="empty">Загрузка...</div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadIngredients() {
            try {
                const response = await fetch('/api/warehouse/ingredients');
                const data = await response.json();
                
                const container = document.getElementById('ingredientsList');
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty">Нет ингредиентов. Добавь первый!</div>';
                    return;
                }
                
                container.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Название</th>
                                <th>Категория</th>
                                <th>Единица</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(i => `
                                <tr>
                                    <td>${i.name_ru}</td>
                                    <td>${i.category || '-'}</td>
                                    <td>${i.unit || 'кг'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (err) {
                console.error('Error:', err);
            }
        }
        
        async function addIngredient() {
            const name = document.getElementById('ingName').value;
            const category = document.getElementById('ingCategory').value;
            const unit = document.getElementById('ingUnit').value;
            
            if (!name) {
                alert('Введи название');
                return;
            }
            
            try {
                const response = await fetch('/api/warehouse/ingredients', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name_ru: name,
                        name_en: '',
                        category: category,
                        unit: unit
                    })
                });
                
                if (response.ok) {
                    document.getElementById('ingName').value = '';
                    document.getElementById('ingCategory').value = '';
                    loadIngredients();
                }
            } catch (err) {
                console.error('Error:', err);
            }
        }
        
        loadIngredients();
    </script>
<script src="js/iframe-helper.js"></script>
</body>
</html>
