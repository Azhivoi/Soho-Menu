<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>Акции и спецпредложения - SOHO Cafe</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        
        .promo-page {
            padding: 20px 16px 100px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .promo-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #1a1a1a;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .promo-title {
            font-size: 28px;
            font-weight: 700;
            color: #e94560;
        }
        
        .promo-subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 32px;
            font-size: 14px;
        }
        
        .promos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .promo-card {
            background: #141414;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
        }
        
        .promo-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #1a1a1a;
        }
        
        .promo-content {
            padding: 20px;
        }
        
        .promo-badge {
            display: inline-block;
            background: #e94560;
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        
        .promo-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }
        
        .promo-desc {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 16px;
            line-height: 1.6;
        }
        
        .promo-conditions {
            margin-bottom: 16px;
        }
        
        .condition-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
        }
        
        .condition-item::before {
            content: '✓';
            color: #4CAF50;
            font-weight: bold;
        }
        
        .promo-footer {
            border-top: 1px solid #222;
            padding-top: 16px;
        }
        
        .promo-conditions-title {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        
        .promo-time {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }
        
        .promo-time::before {
            content: '🕐';
        }
        
        .promo-days {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #888;
        }
        
        .promo-days::before {
            content: '📅';
        }
        
        .promo-code-box {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-top: 16px;
        }
        
        .promo-code-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 4px;
        }
        
        .promo-code {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0a0a0a;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            color: #666;
            text-decoration: none;
            font-size: 11px;
        }
        
        .nav-item.active {
            color: #e94560;
        }
        
        .nav-icon {
            font-size: 24px;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .error {
            text-align: center;
            padding: 60px 20px;
            color: #e94560;
        }
    </style>
</head>
<body>
    <div class="promo-page">
        <div class="promo-header">
            <button class="back-btn" onclick="history.back()">←</button>
        </div>
        
        <h1 class="promo-title" style="text-align: center; margin-bottom: 8px;">Акции и спецпредложения</h1>
        <p class="promo-subtitle">Выгодные предложения для наших гостей</p>
        
        <div class="promos-grid" id="promosContainer">
            <div class="loading">Загрузка акций...</div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="/" class="nav-item">
            <span class="nav-icon">🍽️</span>
            <span>Меню</span>
        </a>
        <a href="/promotions.html" class="nav-item active">
            <span class="nav-icon">🎁</span>
            <span>Акции</span>
        </a>
        <a href="/cart.html" class="nav-item">
            <span class="nav-icon">🛒</span>
            <span>Корзина</span>
        </a>
        <a href="/profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Профиль</span>
        </a>
    </nav>
    
    <script>
        async function loadPromotions() {
            const container = document.getElementById('promosContainer');
            
            try {
                const res = await fetch('/api/marketing/promotions/active/now');
                if (!res.ok) throw new Error('Failed to load');
                
                const promos = await res.json();
                
                if (promos.length === 0) {
                    container.innerHTML = '<div class="loading">Сейчас нет активных акций</div>';
                    return;
                }
                
                const daysMap = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
                
                container.innerHTML = promos.map(p => {
                    const imageUrl = p.banner_mobile || p.image_mobile || '/images/promo-placeholder.jpg';
                    const hasCode = p.code || p.promo_code;
                    
                    let daysText = 'Ежедневно';
                    if (p.days_of_week && p.days_of_week.length > 0 && p.days_of_week.length < 7) {
                        daysText = p.days_of_week.map(d => daysMap[d-1]).join(', ');
                    }
                    
                    const timeText = p.start_time && p.end_time 
                        ? `${p.start_time} - ${p.end_time}`
                        : '00:00 - 23:59';
                    
                    return `
                        <div class="promo-card">
                            <img src="${imageUrl}" alt="${p.name}" class="promo-image" onerror="this.style.background='linear-gradient(135deg, #e94560, #ff6b6b)'">
                            <div class="promo-content">
                                <span class="promo-badge">${p.type === 'n_plus_gift' ? 'ПРОМОКОД' : 'АКЦИЯ'}</span>
                                <h3 class="promo-name">${p.name}</h3>
                                <p class="promo-desc">${p.short_description || p.description || ''}</p>
                                
                                <div class="promo-footer">
                                    <div class="promo-conditions-title">УСЛОВИЯ АКЦИИ</div>
                                    <div class="promo-time">${timeText}</div>
                                    <div class="promo-days">${daysText}</div>
                                </div>
                                
                                ${hasCode ? `
                                <div class="promo-code-box">
                                    <div class="promo-code-label">ПРОМОКОД</div>
                                    <div class="promo-code">${p.code || p.promo_code}</div>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (err) {
                console.error('Error:', err);
                container.innerHTML = '<div class="error">Не удалось загрузить акции</div>';
            }
        }
        
        loadPromotions();
    </script>
</body>
</html>
