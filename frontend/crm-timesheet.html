<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="/js/auth.js"></script>
    <script>document.addEventListener("DOMContentLoaded", function() { const user = getCurrentUser(); if (!user) { window.location.href = "/login.html?redirect=" + encodeURIComponent(window.location.pathname); return; } });</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Табель учёта рабочего времени - SOHO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            padding: 24px;
        }
        
        .page-header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .page-header p {
            color: #888;
            margin-top: 4px;
        }
        
        .month-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .month-selector button {
            padding: 8px 16px;
            background: #252538;
            border: 1px solid #2a2a40;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }
        .month-selector button:hover {
            background: #e94560;
        }
        .month-selector select {
            padding: 8px 16px;
            background: #252538;
            border: 1px solid #2a2a40;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #1a1a2e;
            border: 1px solid #2a2a40;
            border-radius: 12px;
            padding: 20px;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }
        .stat-value.highlight {
            color: #00d9a5;
        }
        
        .card {
            background: #1a1a2e;
            border: 1px solid #2a2a40;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .card-header {
            padding: 16px 20px;
            background: #252538;
            border-bottom: 1px solid #2a2a40;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-header h2 {
            font-size: 16px;
            font-weight: 600;
        }
        
        /* Timesheet Table */
        .timesheet-container {
            overflow-x: auto;
        }
        
        .timesheet-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }
        
        .timesheet-table th {
            background: #252538;
            padding: 12px 8px;
            text-align: center;
            font-size: 12px;
            color: #888;
            border: 1px solid #2a2a40;
            min-width: 50px;
        }
        
        .timesheet-table th.employee-col {
            min-width: 200px;
            text-align: left;
        }
        
        .timesheet-table th.day-header {
            min-width: 45px;
        }
        
        .timesheet-table th.day-header.weekend {
            background: #3a2a2a;
            color: #ff9800;
        }
        
        .timesheet-table th.day-header.today {
            background: #e94560;
            color: #fff;
        }
        
        .timesheet-table td {
            padding: 8px;
            border: 1px solid #2a2a40;
            text-align: center;
            font-size: 13px;
        }
        
        .timesheet-table td.employee-cell {
            text-align: left;
            background: #1a1a2e;
            position: sticky;
            left: 0;
            z-index: 10;
        }
        
        .timesheet-table td.hours-cell {
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .timesheet-table td.hours-cell:hover {
            background: rgba(233, 69, 96, 0.1);
        }
        
        .timesheet-table td.hours-cell.has-hours {
            background: rgba(0, 217, 165, 0.1);
            color: #00d9a5;
            font-weight: 600;
        }
        
        .timesheet-table td.hours-cell.weekend {
            background: rgba(255, 152, 0, 0.05);
        }
        
        .timesheet-table td.total-cell {
            background: #252538;
            font-weight: 600;
        }
        
        .timesheet-table td.salary-cell {
            background: #252538;
            color: #00d9a5;
            font-weight: 700;
        }
        
        .employee-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .employee-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }
        
        .employee-details {
            flex: 1;
        }
        .employee-name {
            font-weight: 600;
            font-size: 14px;
        }
        .employee-role {
            font-size: 11px;
            color: #888;
        }
        
        /* Edit Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: #1a1a2e;
            border: 1px solid #2a2a40;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow: hidden;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #2a2a40;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            font-size: 18px;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: #16162a;
            border: 1px solid #2a2a40;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .time-range {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 12px;
            align-items: center;
        }
        
        .calculated-hours {
            background: #252538;
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
        }
        .calculated-hours .label {
            font-size: 12px;
            color: #888;
        }
        .calculated-hours .value {
            font-size: 24px;
            font-weight: 700;
            color: #00d9a5;
        }
        
        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #2a2a40;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #e94560;
            color: #fff;
        }
        .btn-primary:hover {
            background: #ff5773;
        }
        .btn-secondary {
            background: #252538;
            color: #fff;
            border: 1px solid #2a2a40;
        }
        .btn-success {
            background: #4caf50;
            color: #fff;
        }
        
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            font-size: 12px;
            color: #888;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid #2a2a40;
        }
        .legend-box.has-hours {
            background: rgba(0, 217, 165, 0.1);
            border-color: #00d9a5;
        }
        .legend-box.weekend {
            background: rgba(255, 152, 0, 0.05);
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div>
            <h1>📅 Табель учёта рабочего времени</h1>
            <p>Учёт отработанных часов и расчёт зарплаты</p>
        </div>
        <div class="month-selector">
            <button onclick="changeMonth(-1)">◀</button>
            <select id="monthSelect" onchange="loadTimesheet()">
                <option value="0">Январь</option>
                <option value="1">Февраль</option>
                <option value="2">Март</option>
                <option value="3">Апрель</option>
                <option value="4">Май</option>
                <option value="5">Июнь</option>
                <option value="6">Июль</option>
                <option value="7">Август</option>
                <option value="8">Сентябрь</option>
                <option value="9">Октябрь</option>
                <option value="10">Ноябрь</option>
                <option value="11">Декабрь</option>
            </select>
            <select id="yearSelect" onchange="loadTimesheet()">
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
                <option value="2027">2027</option>
            </select>
            <button onclick="changeMonth(1)">▶</button>
        </div>
    </div>
    
    <div class="stats-cards">
        <div class="stat-card">
            <div class="stat-label">Всего сотрудников</div>
            <div class="stat-value" id="totalEmployees">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Всего часов за месяц</div>
            <div class="stat-value highlight" id="totalHours">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Среднее в день</div>
            <div class="stat-value" id="avgHours">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">К выплате (BYN)</div>
            <div class="stat-value highlight" id="totalSalary">0</div>
        </div>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h2>📊 Месячный график</h2>
            <button class="btn btn-primary" onclick="exportTimesheet()">📥 Экспорт</button>
        </div>
        <div class="timesheet-container">
            <table class="timesheet-table" id="timesheetTable">
                <thead id="tableHead">
                    <!-- Generated by JS -->
                </thead>
                <tbody id="tableBody">
                    <!-- Generated by JS -->
                </tbody>
            </table>
        </div>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-box has-hours"></div>
                <span>Есть часы</span>
            </div>
            <div class="legend-item">
                <div class="legend-box weekend"></div>
                <span>Выходной</span>
            </div>
            <div class="legend-item">
                <span>💡 Кликните на ячейку для редактирования</span>
            </div>
        </div>
    </div>
    
    <!-- Edit Hours Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h3>✏️ Редактирование часов</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Сотрудник</label>
                    <input type="text" id="modalEmployeeName" class="form-input" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">Дата</label>
                    <input type="text" id="modalDate" class="form-input" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">Время работы</label>
                    <div class="time-range">
                        <input type="time" id="modalStartTime" class="form-input">
                        <span>—</span>
                        <input type="time" id="modalEndTime" class="form-input">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Перерыв (минут)</label>
                    <input type="number" id="modalBreakMinutes" class="form-input" value="0" min="0" max="180">
                </div>
                <div class="form-group">
                    <label class="form-label">Или введите часы вручную</label>
                    <input type="number" id="modalManualHours" class="form-input" step="0.5" min="0" max="24" placeholder="Автоматический расчёт">
                </div>
                <div class="form-group">
                    <label class="form-label">Примечания</label>
                    <input type="text" id="modalNotes" class="form-input" placeholder="Например: Больничный, Отпуск...">
                </div>
                <div class="calculated-hours">
                    <div class="label">Отработано часов:</div>
                    <div class="value" id="modalCalculatedHours">0.0</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
                <button class="btn btn-success" onclick="saveHours()">💾 Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        let employees = [];
        let timesheetData = {};
        let currentEmployeeId = null;
        let currentDate = null;
        
        // Set current month
        const now = new Date();
        document.getElementById('monthSelect').value = now.getMonth();
        document.getElementById('yearSelect').value = now.getFullYear();
        
        async function init() {
            await loadEmployees();
            loadTimesheet();
        }
        
        async function loadEmployees() {
            try {
                const response = await fetch('/api/employees/employees');
                if (response.ok) {
                    employees = await response.json();
                    document.getElementById('totalEmployees').textContent = employees.length;
                }
            } catch (err) {
                console.error('Error loading employees:', err);
            }
        }
        
        function changeMonth(delta) {
            const monthSelect = document.getElementById('monthSelect');
            const yearSelect = document.getElementById('yearSelect');
            
            let month = parseInt(monthSelect.value) + delta;
            let year = parseInt(yearSelect.value);
            
            if (month < 0) {
                month = 11;
                year--;
            } else if (month > 11) {
                month = 0;
                year++;
            }
            
            monthSelect.value = month;
            yearSelect.value = year;
            loadTimesheet();
        }
        
        async function loadTimesheet() {
            const month = parseInt(document.getElementById('monthSelect').value);
            const year = parseInt(document.getElementById('yearSelect').value);
            
            // Generate table header
            generateTableHeader(year, month);
            
            // Load work hours for all employees
            const startDate = new Date(year, month, 1);
            const endDate = new Date(year, month + 1, 0);
            
            timesheetData = {};
            let totalHours = 0;
            let totalSalary = 0;
            
            for (const emp of employees) {
                try {
                    const response = await fetch(
                        `/api/employees/employees/${emp.id}/work-hours?start_date=${formatDate(startDate)}&end_date=${formatDate(endDate)}`
                    );
                    if (response.ok) {
                        const hours = await response.json();
                        timesheetData[emp.id] = hours;
                        
                        const empHours = hours.reduce((sum, h) => sum + (h.total_hours || 0), 0);
                        totalHours += empHours;
                        totalSalary += empHours * (emp.hourly_rate || 0);
                    }
                } catch (err) {
                    console.error(`Error loading hours for employee ${emp.id}:`, err);
                }
            }
            
            // Generate table body
            generateTableBody(year, month);
            
            // Update stats
            document.getElementById('totalHours').textContent = totalHours.toFixed(1);
            document.getElementById('totalSalary').textContent = totalSalary.toFixed(2);
            
            const daysInMonth = endDate.getDate();
            document.getElementById('avgHours').textContent = employees.length > 0 ? 
                (totalHours / employees.length / daysInMonth).toFixed(1) : '0';
        }
        
        function generateTableHeader(year, month) {
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const thead = document.getElementById('tableHead');
            
            let html = '<tr><th class="employee-col">Сотрудник</th>';
            
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dayOfWeek = date.getDay();
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                const isToday = isSameDate(date, new Date());
                
                const dayNames = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
                
                html += `<th class="day-header ${isWeekend ? 'weekend' : ''} ${isToday ? 'today' : ''}">
                    <div>${day}</div>
                    <div style="font-size: 10px;">${dayNames[dayOfWeek]}</div>
                </th>`;
            }
            
            html += '<th class="total-cell">Всего<br>часов</th>';
            html += '<th class="salary-cell">К выплате<br>(BYN)</th>';
            html += '</tr>';
            
            thead.innerHTML = html;
        }
        
        function generateTableBody(year, month) {
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const tbody = document.getElementById('tableBody');
            
            let html = '';
            
            for (const emp of employees) {
                if (!emp.is_active) continue;
                
                const initials = emp.first_name[0] + (emp.last_name ? emp.last_name[0] : '');
                const hours = timesheetData[emp.id] || [];
                
                let totalHours = 0;
                let rowHtml = `<tr>
                    <td class="employee-cell">
                        <div class="employee-info">
                            <div class="employee-avatar">${initials}</div>
                            <div class="employee-details">
                                <div class="employee-name">${emp.name}</div>
                                <div class="employee-role">${emp.role_name} • ${emp.hourly_rate || 0} BYN/ч</div>
                            </div>
                        </div>
                    </td>`;
                
                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(year, month, day);
                    const dateStr = formatDate(date);
                    const dayOfWeek = date.getDay();
                    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                    
                    const dayHours = hours.find(h => h.work_date === dateStr);
                    const hoursWorked = dayHours ? dayHours.total_hours : null;
                    
                    if (hoursWorked) {
                        totalHours += parseFloat(hoursWorked);
                    }
                    
                    rowHtml += `<td class="hours-cell ${hoursWorked ? 'has-hours' : ''} ${isWeekend ? 'weekend' : ''}" 
                        onclick="editHours(${emp.id}, '${dateStr}')">
                        ${hoursWorked ? hoursWorked.toFixed(1) : ''}
                    </td>`;
                }
                
                const salary = totalHours * (emp.hourly_rate || 0);
                
                rowHtml += `<td class="total-cell">${totalHours.toFixed(1)}</td>`;
                rowHtml += `<td class="salary-cell">${salary.toFixed(2)}</td>`;
                rowHtml += '</tr>';
                
                html += rowHtml;
            }
            
            tbody.innerHTML = html;
        }
        
        async function editHours(employeeId, dateStr) {
            currentEmployeeId = employeeId;
            currentDate = dateStr;
            
            const emp = employees.find(e => e.id === employeeId);
            if (!emp) return;
            
            const date = new Date(dateStr);
            const dateDisplay = date.toLocaleDateString('ru-RU', {day: 'numeric', month: 'long', year: 'numeric'});
            
            document.getElementById('modalEmployeeName').value = emp.name;
            document.getElementById('modalDate').value = dateDisplay;
            
            // Load existing hours
            const hours = timesheetData[employeeId] || [];
            const dayHours = hours.find(h => h.work_date === dateStr);
            
            if (dayHours) {
                document.getElementById('modalStartTime').value = dayHours.start_time ? dayHours.start_time.substring(0, 5) : '';
                document.getElementById('modalEndTime').value = dayHours.end_time ? dayHours.end_time.substring(0, 5) : '';
                document.getElementById('modalBreakMinutes').value = dayHours.break_minutes || 0;
                document.getElementById('modalManualHours').value = dayHours.total_hours || '';
                document.getElementById('modalNotes').value = dayHours.notes || '';
            } else {
                // New entry - set defaults but show 0 in manual hours
                document.getElementById('modalStartTime').value = '';
                document.getElementById('modalEndTime').value = '';
                document.getElementById('modalBreakMinutes').value = 0;
                document.getElementById('modalManualHours').value = '0';
                document.getElementById('modalNotes').value = '';
            }
            
            calculateModalHours();
            document.getElementById('editModal').classList.add('active');

            // Focus on manual hours field after modal opens
            setTimeout(() => {
                const manualField = document.getElementById('modalManualHours');
                manualField.focus();
                manualField.select();
            }, 100);
        }
        
        function calculateModalHours() {
            const startTime = document.getElementById('modalStartTime').value;
            const endTime = document.getElementById('modalEndTime').value;
            const breakMinutes = parseInt(document.getElementById('modalBreakMinutes').value) || 0;
            const manualHoursInput = document.getElementById('modalManualHours').value;
            const manualHours = manualHoursInput ? parseFloat(manualHoursInput) : null;

            let hours = 0;

            // Priority: manual hours (only if explicitly entered and valid)
            if (manualHours !== null && !isNaN(manualHours) && manualHours >= 0) {
                hours = manualHours;
                document.getElementById('modalCalculatedHours').textContent = hours.toFixed(1);
                document.getElementById('modalCalculatedHours').style.color = '#2196f3'; // Blue for manual
                return;
            }

            // Otherwise calculate from time (only if both times are set)
            if (startTime && endTime) {
                const start = new Date(`2000-01-01T${startTime}`);
                const end = new Date(`2000-01-01T${endTime}`);

                if (end < start) {
                    end.setDate(end.getDate() + 1);
                }

                const diffMs = end - start;
                const diffHours = diffMs / (1000 * 60 * 60);
                hours = Math.max(0, diffHours - (breakMinutes / 60));
            }

            document.getElementById('modalCalculatedHours').textContent = hours.toFixed(1);
            document.getElementById('modalCalculatedHours').style.color = hours > 0 ? '#00d9a5' : '#888'; // Green for auto, gray for zero
        }
        
        // Auto-calculate on input change
        ['modalStartTime', 'modalEndTime', 'modalBreakMinutes', 'modalManualHours'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculateModalHours);
        });

        // Save on Enter key
        document.getElementById('editModal').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                saveHours();
            }
        });
        
        async function saveHours() {
            const startTime = document.getElementById('modalStartTime').value;
            const endTime = document.getElementById('modalEndTime').value;
            const breakMinutes = parseInt(document.getElementById('modalBreakMinutes').value) || 0;
            const manualHoursInput = document.getElementById('modalManualHours').value.trim();
            const manualHours = manualHoursInput ? parseFloat(manualHoursInput) : null;
            const notes = document.getElementById('modalNotes').value;

            let totalHours = 0;

            // Priority: manual hours (only if explicitly entered and valid)
            if (manualHours !== null && !isNaN(manualHours) && manualHours > 0) {
                totalHours = manualHours;
            } else if (startTime && endTime) {
                const start = new Date(`2000-01-01T${startTime}`);
                const end = new Date(`2000-01-01T${endTime}`);

                if (end < start) {
                    end.setDate(end.getDate() + 1);
                }

                const diffMs = end - start;
                const diffHours = diffMs / (1000 * 60 * 60);
                totalHours = Math.max(0, diffHours - (breakMinutes / 60));
            }
            
            const data = {
                employee_id: currentEmployeeId,
                work_date: currentDate,
                start_time: startTime || null,
                end_time: endTime || null,
                break_minutes: breakMinutes,
                total_hours: totalHours > 0 ? totalHours : null,
                notes: notes
            };
            
            try {
                const response = await fetch(`/api/employees/employees/${currentEmployeeId}/work-hours`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    closeModal();
                    await loadTimesheet();
                } else {
                    alert('❌ Ошибка сохранения');
                }
            } catch (err) {
                console.error('Error:', err);
                alert('❌ Ошибка соединения');
            }
        }
        
        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }
        
        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }
        
        function isSameDate(d1, d2) {
            return d1.getDate() === d2.getDate() &&
                   d1.getMonth() === d2.getMonth() &&
                   d1.getFullYear() === d2.getFullYear();
        }
        
        function exportTimesheet() {
            alert('Экспорт в Excel - в разработке');
        }
        
        // Init
        init();
    </script>
</body>
</html>
