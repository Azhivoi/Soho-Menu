<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="/js/auth.js"></script>
    <script>document.addEventListener("DOMContentLoaded", function() { const user = getCurrentUser(); if (!user) { window.location.href = "/login.html?redirect=" + encodeURIComponent(window.location.pathname); return; } });</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Техкарты | SOHO CRM</title>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #252538;
            --accent-red: #e94560;
            --accent-green: #00d9a5;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b8;
            --border-color: #33334d;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .header h1 { font-size: 28px; }
        .header h1 span { color: var(--accent-red); }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 12px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab:hover, .tab.active {
            background: var(--accent-red);
            color: white;
            border-color: var(--accent-red);
        }
        
        .content { display: none; }
        .content.active { display: block; }
        
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--accent-red);
            color: white;
        }
        
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .btn:hover { opacity: 0.9; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }
        
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        th {
            background: var(--bg-secondary);
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        
        tr:hover { background: rgba(255,255,255,0.05); }
        
        .cost { color: var(--accent-green); font-weight: 600; }
        
        .actions { display: flex; gap: 8px; }
        
        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
        }
        
        .icon-btn:hover { background: var(--accent-red); border-color: var(--accent-red); }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .recipe-items {
            margin-top: 20px;
        }
        
        .recipe-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 10px;
            padding: 10px;
            background: var(--bg-secondary);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span>SOHO</span> Техкарты</h1>
            <a href="crm-dashboard.html" class="btn btn-secondary">← Назад</a>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('ingredients')">📦 Ингредиенты</div>
            <div class="tab" onclick="switchTab('semi')">⚙️ Полуфабрикаты</div>
            <div class="tab" onclick="switchTab('recipes')">📝 Техкарты</div>
        </div>
        
        <!-- Ingredients -->
        <div id="ingredientsTab" class="content active">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="openIngredientModal()">+ Добавить</button>
                <button class="btn btn-secondary" onclick="importIngredients()">📥 Импорт</button>
                <button class="btn btn-secondary" onclick="exportIngredients()">📤 Экспорт</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Название</th>
                        <th>Категория</th>
                        <th>Ед.изм</th>
                        <th>Себестоимость</th>
                        <th>Поставщик</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="ingredientsTable"></tbody>
            </table>
        </div>
        
        <!-- Semi-products -->
        <div id="semiTab" class="content">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="openSemiModal()">+ Добавить</button>
                <button class="btn btn-secondary" onclick="importSemi()">📥 Импорт</button>
                <button class="btn btn-secondary" onclick="exportSemi()">📤 Экспорт</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Название</th>
                        <th>Категория</th>
                        <th>Выход</th>
                        <th>Себест. за 100г</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="semiTable"></tbody>
            </table>
        </div>
        
        <!-- Recipes -->
        <div id="recipesTab" class="content">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="openRecipeModal()">+ Создать техкарту</button>
                <button class="btn btn-secondary" onclick="importRecipes()">📥 Импорт</button>
                <button class="btn btn-secondary" onclick="exportRecipes()">📤 Экспорт</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Товар</th>
                        <th>Выход</th>
                        <th>Время пригот.</th>
                        <th>Себестоимость</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="recipesTable"></tbody>
            </table>
        </div>
    </div>
    
    <!-- Ingredient Modal -->
    <div id="ingredientModal" class="modal">
        <div class="modal-content">
            <h2>Ингредиент</h2>
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="ingName" placeholder="Например: Рис для суши">
            </div>
            <div class="form-group">
                <label>Категория</label>
                <select id="ingCategory">
                    <option value="">Выберите...</option>
                    <option value="vegetables">Овощи</option>
                    <option value="fish">Рыба</option>
                    <option value="meat">Мясо</option>
                    <option value="groceries">Бакалея</option>
                    <option value="dairy">Молочные</option>
                    <option value="sauces">Соусы</option>
                    <option value="other">Другое</option>
                </select>
            </div>
            <div class="form-group">
                <label>Единица измерения</label>
                <select id="ingUnit">
                    <option value="г">грамм (г)</option>
                    <option value="кг">килограмм (кг)</option>
                    <option value="мл">миллилитр (мл)</option>
                    <option value="л">литр (л)</option>
                    <option value="шт">штука (шт)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Себестоимость за единицу</label>
                <input type="number" id="ingCost" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Поставщик</label>
                <input type="text" id="ingSupplier" placeholder="Название поставщика">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveIngredient()">Сохранить</button>
                <button class="btn btn-secondary" onclick="closeModal('ingredientModal')">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        let ingredients = [];
        let semiProducts = [];
        let recipes = [];
        
        // Switch tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
            
            if (tab === 'ingredients') loadIngredients();
            if (tab === 'semi') loadSemi();
            if (tab === 'recipes') loadRecipes();
        }
        
        // Load ingredients
        async function loadIngredients() {
            try {
                const response = await fetch('/api/recipes/ingredients');
                ingredients = await response.json();
                renderIngredients();
            } catch (err) {
                console.error('Error loading ingredients:', err);
            }
        }
        
        function renderIngredients() {
            const tbody = document.getElementById('ingredientsTable');
            tbody.innerHTML = ingredients.map(ing => `
                <tr>
                    <td>${ing.name_ru}</td>
                    <td>${ing.category || '-'}</td>
                    <td>${ing.unit}</td>
                    <td class="cost">${parseFloat(ing.cost_per_unit || 0).toFixed(2)} BYN</td>
                    <td>${ing.supplier || '-'}</td>
                    <td class="actions">
                        <button class="icon-btn" onclick="editIngredient(${ing.id})">✏️</button>
                        <button class="icon-btn" onclick="deleteIngredient(${ing.id})">🗑️</button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="6" style="text-align:center;padding:40px;">Нет ингредиентов</td></tr>';
        }
        
        // Modal functions
        function openIngredientModal() {
            document.getElementById('ingredientModal').classList.add('active');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        // Export/Import
        async function exportIngredients() {
            try {
                const response = await fetch('/api/recipes/ingredients/export');
                const data = await response.json();
                const csv = convertToCSV(data);
                downloadFile(csv, 'ingredients.csv');
            } catch (err) {
                alert('Ошибка экспорта');
            }
        }
        
        function convertToCSV(data) {
            if (!data.length) return '';
            const headers = Object.keys(data[0]);
            const rows = data.map(row => headers.map(h => row[h]).join(';'));
            return [headers.join(';'), ...rows].join('\n');
        }
        
        function downloadFile(content, filename) {
            const blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }
        
        // Initial load
        loadIngredients();
    </script>
<script src="js/iframe-helper.js"></script>
</body>
</html>
